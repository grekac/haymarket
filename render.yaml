# HayMarket — Render + Supabase
# 1) Создайте проект на https://supabase.com
# 2) Скопируйте Connection strings из Settings → Database
# 3) Вставьте в Environment на Render

services:
  - type: web
    name: haymarket
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: SETUP_SECRET
        generateValue: true
      - key: INTERNAL_SOCKET_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        fromService:
          name: haymarket-socket
          type: web
          property: host
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          name: haymarket
          type: web
          property: host

  - type: web
    name: haymarket-socket
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm run start:socket
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        fromService:
          name: haymarket
          type: web
          envVarKey: AUTH_SECRET
      - key: INTERNAL_SOCKET_SECRET
        fromService:
          name: haymarket
          type: web
          envVarKey: INTERNAL_SOCKET_SECRET
